<title>Amir Benyamini · DevOps Engineer</title>
<meta name="description" content="Amir Benyamini, DevOps Engineer. Platform Engineering, Self-Service IaC, CI/CD at Scale, AI-Augmented DevOps.">

<style>
:root {
  --bg: #0a0d10;
  --panel: #0d1116;
  --panel-2: #11161d;
  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.16);
  --text: #e6edf3;
  --muted: #6b7681;
  --accent: #4ade80;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --sans: "Inter", -apple-system, system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg); color: var(--text);
  font-family: var(--sans); font-size: 15px; line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
body {
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(74, 222, 128, 0.04), transparent 60%),
    linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px) 0 0 / 32px 32px,
    linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px) 0 0 / 32px 32px,
    var(--bg);
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }
h1, h2, h3 { font-weight: 500; letter-spacing: -0.01em; }
.mono { font-family: var(--mono); }
.muted { color: var(--muted); }
.small { font-size: 12.5px; letter-spacing: 0.04em; }
.micro { font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; }

.app { max-width: 1280px; margin: 0 auto; padding: 32px 28px 48px; display: flex; flex-direction: column; gap: 28px; }

/* Header */
.hud-header {
  position: relative; background: linear-gradient(180deg, var(--panel-2), var(--panel));
  border: 1px solid var(--border); border-radius: 4px; padding: 24px 28px;
  display: flex; flex-direction: column; gap: 20px; overflow: hidden;
}
.hud-corner { position: absolute; width: 14px; height: 14px; border: 1px solid var(--accent); }
.hud-corner.tl { top: 8px; left: 8px; border-right: none; border-bottom: none; }
.hud-corner.tr { top: 8px; right: 8px; border-left: none; border-bottom: none; }
.hud-corner.bl { bottom: 8px; left: 8px; border-right: none; border-top: none; }
.hud-corner.br { bottom: 8px; right: 8px; border-left: none; border-top: none; }
.hud-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.hud-identity { display: flex; justify-content: space-between; align-items: flex-end; gap: 32px; flex-wrap: wrap; padding: 8px 0 4px; }
.hud-name h1 {
  font-size: clamp(40px, 6vw, 64px); font-weight: 600; letter-spacing: -0.025em;
  line-height: 1; margin: 6px 0 12px;
}
.role-line { display: flex; gap: 14px; align-items: baseline; flex-wrap: wrap; font-family: var(--mono); font-size: 14px; }
.role { font-weight: 500; color: var(--accent); }
.hud-stats { display: flex; gap: 28px; flex-wrap: wrap; }
.stat { min-width: 120px; }
.stat-value { font-size: 14px; margin-top: 4px; display: flex; align-items: center; gap: 8px; font-weight: 500; color: var(--accent); font-family: var(--mono); }
.blink-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1.6s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.hud-contact { border-top: 1px dashed var(--border); padding-top: 16px; gap: 10px; }
.chip {
  display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px 6px 6px;
  border: 1px solid var(--border); border-radius: 3px; background: rgba(255, 255, 255, 0.015);
  transition: border-color 0.15s, background 0.15s;
}
.chip:hover { border-color: var(--border-strong); background: rgba(255, 255, 255, 0.03); }
.chip-icon {
  width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid; border-radius: 3px; font-family: var(--mono); font-size: 11px;
  color: var(--accent); border-color: rgba(74, 222, 128, 0.33);
}

/* Layout */
.main-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 28px; }
.col { display: flex; flex-direction: column; gap: 28px; }
@media (max-width: 980px) { .main-grid { grid-template-columns: 1fr; } }

/* Panel */
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.panel-header { display: flex; align-items: baseline; gap: 10px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.panel-header h2 { font-size: 13px; letter-spacing: 0.18em; font-family: var(--mono); }

/* Summary block (replaces interactive terminal) */
.summary-panel { padding: 20px 22px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; }
.summary-panel .label { font-family: var(--mono); color: var(--muted); font-size: 12.5px; letter-spacing: 0.04em; }
.summary-panel p { margin-top: 10px; max-width: 68ch; }

/* Projects */
.projects-panel { padding: 0; }
.project-card {
  padding: 18px 22px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 10px;
}
.project-card:last-child { border-bottom: none; }
.project-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
.project-name { font-family: var(--mono); font-size: 16px; color: var(--accent); font-weight: 500; }
.project-tagline { color: var(--text); font-size: 13.5px; }
.project-badge {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 2px 7px; border: 1px solid;
  border-radius: 2px; color: var(--muted); border-color: rgba(255,255,255,0.15);
  margin-left: auto;
}
.project-pitch { color: var(--muted); font-size: 13.5px; max-width: 60ch; }
.project-section-label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); margin-top: 4px;
}
.project-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
.project-list li { display: flex; gap: 10px; font-size: 13.5px; max-width: 64ch; }
.project-list li .pmark { color: var(--accent); font-family: var(--mono); padding-top: 2px; flex: none; }
.project-stack { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.project-stack .tag { font-family: var(--mono); font-size: 11.5px; padding: 2px 7px; border: 1px solid rgba(74, 222, 128, 0.27); border-radius: 2px; color: var(--text); }

/* Skills */
.skill-group { border-bottom: 1px solid var(--border); padding: 14px 20px; }
.skill-group:last-child { border-bottom: none; }
.skill-group-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; letter-spacing: 0.12em; text-transform: uppercase; font-family: var(--mono); font-size: 12.5px; }
.skill-group-head .arrow { color: var(--accent); }
.skill-row { display: grid; grid-template-columns: 200px 1fr 32px; align-items: center; gap: 12px; padding: 4px 0; }
.skill-name { font-family: var(--mono); font-size: 12.5px; }
.skill-bar { position: relative; height: 6px; background: rgba(255, 255, 255, 0.04); border-radius: 1px; overflow: hidden; }
.skill-fill { height: 100%; background: var(--accent); box-shadow: 0 0 8px rgba(74, 222, 128, 0.4); }
.skill-pct { font-family: var(--mono); font-size: 12.5px; color: var(--muted); text-align: right; }

/* Timeline */
.timeline { position: relative; padding: 20px 24px; }
.timeline-spine {
  position: absolute; left: 38px; top: 28px; bottom: 28px; width: 1px;
  background: linear-gradient(to bottom, var(--accent), transparent); opacity: 0.5;
}
.tl-item { position: relative; padding-left: 36px; padding-bottom: 22px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-marker {
  position: absolute; left: 8px; top: 6px; width: 12px; height: 12px;
  border: 2px solid var(--accent); border-radius: 50%; background: var(--bg); z-index: 1;
}
.tl-marker.active { background: var(--accent); }
.tl-head-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.tl-status {
  font-family: var(--mono); padding: 2px 7px; border: 1px solid;
  font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255, 255, 255, 0.4); border-color: rgba(255, 255, 255, 0.15); border-radius: 2px;
}
.tl-status.active { color: var(--accent); border-color: var(--accent); }
.tl-title { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px; font-size: 18px; font-weight: 500; letter-spacing: -0.01em; margin-bottom: 4px; }
.tl-company { font-family: var(--mono); font-size: 14px; color: var(--accent); }
.tl-summary { color: var(--muted); font-size: 14px; max-width: 60ch; }
.tl-bullets { list-style: none; padding: 14px 0 4px; display: flex; flex-direction: column; gap: 8px; }
.tl-bullets li { display: flex; gap: 10px; font-size: 14px; max-width: 72ch; }
.tl-bullets li .lead { color: var(--accent); font-weight: 600; }
.bullet-mark { color: var(--accent); padding-top: 2px; font-family: var(--mono); }
.stack { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.stack-tag { font-family: var(--mono); font-size: 12.5px; padding: 3px 8px; border: 1px solid rgba(74, 222, 128, 0.27); border-radius: 2px; }

/* Meta */
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 600px) { .meta-grid { grid-template-columns: 1fr; } }
.trait-grid { display: grid; grid-template-columns: 1fr 1fr; padding: 16px 20px; gap: 8px 16px; font-family: var(--mono); font-size: 12.5px; }
.trait .num { color: var(--accent); }
.lang-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
.lang-row { display: flex; justify-content: space-between; }
.lang-level { font-family: var(--mono); font-size: 12.5px; color: var(--accent); }

/* Footer */
.hud-footer {
  display: flex; justify-content: space-between; gap: 16px;
  padding: 18px 6px; border-top: 1px solid var(--border); flex-wrap: wrap;
  font-family: var(--mono); font-size: 12.5px; color: var(--muted);
}
.hud-footer a { color: var(--accent); }

/* ─── Responsive (mobile + tablet) ─── */
html, body { overflow-x: hidden; }

@media (max-width: 820px) {
  .app { padding: 18px 14px 32px; gap: 18px; }
  .hud-header { padding: 16px 18px; gap: 14px; }
  .hud-name h1 { font-size: 36px; line-height: 1.05; }
  .hud-identity { gap: 18px; padding: 4px 0; }
  .hud-stats { gap: 16px; }
  .stat { min-width: 0; }
  .role-line { font-size: 13px; }
  .panel-header { padding: 12px 14px; }
  .timeline { padding: 16px 14px; }
  .tl-item { padding-left: 30px; padding-bottom: 18px; }
  .timeline-spine { left: 32px; }
  .tl-marker { left: 6px; }
  .tl-title { font-size: 16px; }
  .tl-bullets li { font-size: 13.5px; max-width: 100%; word-wrap: break-word; overflow-wrap: anywhere; }
  .skill-row { grid-template-columns: 150px 1fr 28px; gap: 8px; }
  .skill-name { font-size: 12px; }
  .summary-panel { padding: 14px 16px; }
  .summary-panel p { font-size: 14px; }
  .project-card { padding: 14px 16px; gap: 8px; }
  .project-name { font-size: 14px; }
  .project-tagline { font-size: 13px; }
  .project-pitch, .project-list li { font-size: 13px; max-width: 100%; }
  .project-badge { margin-left: 0; }
  .project-stack .tag { font-size: 11px; padding: 2px 6px; }
  .trait-grid, .lang-list { padding: 12px 14px; }
  .stack-tag { font-size: 11px; padding: 2px 6px; }
  .chip { padding: 5px 8px 5px 5px; }
  .chip-icon { width: 20px; height: 20px; font-size: 10.5px; }
  .hud-corner { width: 10px; height: 10px; }
}

@media (max-width: 480px) {
  .app { padding: 14px 10px 28px; gap: 14px; }
  .hud-name h1 { font-size: 30px; }
  .hud-stats { flex-direction: column; gap: 8px; align-items: flex-start; }
  .hud-contact { gap: 6px; padding-top: 12px; }
  .skill-row { grid-template-columns: 105px 1fr 26px; gap: 6px; }
  .skill-name { font-size: 11.5px; }
  .tl-title { font-size: 15px; }
  .tl-summary { font-size: 13px; }
  .project-head { gap: 6px; }
}
</style>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {hasDeckStage && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

// ─── TERMINAL ───────────────────────────────────────────────────────
const HELP_TEXT = [
  "Available commands:",
  "  whoami          identity & summary",
  "  skills [tag]    list skills (try: skills cloud)",
  "  experience      recent roles",
  "  contact         how to reach me",
  "  ls /projects    show key projects",
  "  cat traits.txt  what I'm like to work with",
  "  clear           clear the terminal",
  "  help            this menu",
];

function Terminal({ accent }) {
  const [history, setHistory] = useState([
    { kind: "system", text: "amir@devops:~$ session started" },
    { kind: "system", text: `Welcome. Type 'help' or click a suggestion below.` },
  ]);
  const [input, setInput] = useState("");
  const inputRef = useRef(null);
  const bodyRef = useRef(null);

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [history]);

  function run(raw) {
    const cmd = raw.trim();
    if (!cmd) return;
    const out = [{ kind: "prompt", text: cmd }];
    const [head, ...rest] = cmd.split(/\s+/);
    const arg = rest.join(" ").toLowerCase();

    switch (head.toLowerCase()) {
      case "help":
        HELP_TEXT.forEach((l) => out.push({ kind: "out", text: l }));
        break;
      case "whoami":
        out.push({ kind: "out", text: `${RESUME.name} · ${RESUME.role}` });
        out.push({ kind: "out", text: `→ ${RESUME.tagline}` });
        out.push({ kind: "out", text: `→ ${RESUME.summary}` });
        out.push({ kind: "out", text: `→ Based in ${RESUME.location}, currently ${"OPEN_TO_WORK"}.` });
        break;
      case "skills": {
        const groups = Object.entries(RESUME.skills);
        const filtered = arg
          ? groups.filter(([g]) => g.toLowerCase().includes(arg))
          : groups;
        if (filtered.length === 0) {
          out.push({ kind: "err", text: `no skill group matches '${arg}'` });
        } else {
          filtered.forEach(([g, items]) => {
            out.push({ kind: "out", text: `[${g}]` });
            items.forEach((s) => {
              const bar = "█".repeat(Math.round(s.level * 10)) + "░".repeat(10 - Math.round(s.level * 10));
              out.push({ kind: "out", text: `  ${s.name.padEnd(22, " ")} ${bar} ${Math.round(s.level * 100)}%` });
            });
          });
        }
        break;
      }
      case "experience":
        RESUME.experience.forEach((e) => {
          out.push({ kind: "out", text: `${e.period} · ${e.title} @ ${e.company}` });
          out.push({ kind: "out", text: `  ${e.summary}` });
        });
        break;
      case "contact":
        out.push({ kind: "out", text: `email   : ${RESUME.email}` });
        out.push({ kind: "out", text: `phone   : ${RESUME.phone}` });
        out.push({ kind: "out", text: `linkedin: linkedin.com/in/${RESUME.linkedin}` });
        out.push({ kind: "out", text: `github  : github.com/${RESUME.github}` });
        break;
      case "ls":
        if (arg.includes("project")) {
          [
            "┌──────────────────────────────────────────────────",
            "│ cloudblox/                       private · pre-launch",
            "└──────────────────────────────────────────────────",
            "  Personal IaC platform.",
            "  Production-grade AWS infra from a single blox.yaml.",
            "",
            "  THE PROBLEM",
            "    At scaling startups, 1-2 DevOps engineers field",
            "    every infra request. Devs can't self-serve;",
            "    DevOps can't keep up.",
            "",
            "  HOW IT WORKS",
            "    · Composable blocks (EKS, RDS, Lambda, ECS,",
            "      static-sites, more) provision real AWS",
            "      resources. Pulumi runs under the hood.",
            "      Devs never write or see Pulumi code.",
            "    · Two-repo model: infra repo (DevOps owns)",
            "      + gitops repo (developers own). One CLI",
            "      drives both. Same `cloudblox deploy` flow.",
            "    · GitOps-friendly: every workload is declared",
            "      in YAML, versioned, and reviewed in PRs.",
            "",
            "  STACK",
            "    TypeScript · Pulumi · Node CLI · AWS · GitHub Actions",
            "",
            "┌──────────────────────────────────────────────────",
            "│ amir-resume-site/                deployed via cloudblox",
            "└──────────────────────────────────────────────────",
            "  This resume.",
            "  Dogfooding CloudBlox to ship its own demo site.",
            "",
            "  · Defined in a 10-line blox.yaml (static-site block).",
            "  · Provisions S3 + CloudFront + Route 53 + ACM.",
            "  · Pushed by the same CLI CloudBlox ships to users.",
            "  · Built fully static (no JS) so it's fast, indexable,",
            "    and prints clean to PDF.",
          ].forEach((t) => out.push({ kind: "out", text: t }));
        } else {
          out.push({ kind: "err", text: `ls: cannot access '${arg || "/"}'. try: ls /projects` });
        }
        break;
      case "cat":
        if (arg === "traits.txt") {
          RESUME.traits.forEach((t) => out.push({ kind: "out", text: `· ${t}` }));
        } else {
          out.push({ kind: "err", text: `cat: ${arg}: No such file. try: cat traits.txt` });
        }
        break;
      case "clear":
        setHistory([]);
        return;
      case "sudo":
        out.push({ kind: "err", text: `${RESUME.name} is not in the sudoers file. This incident will be reported.` });
        break;
      default:
        out.push({ kind: "err", text: `command not found: ${head}. try: help` });
    }
    setHistory((h) => [...h, ...out]);
  }

  const suggestions = ["whoami", "skills", "experience", "ls /projects", "contact", "cat traits.txt"];

  return (
    <section className="panel terminal" onClick={() => inputRef.current?.focus()}>
      <div className="panel-bar">
        <span className="tl-dot" style={{ background: "#ff5f56" }} />
        <span className="tl-dot" style={{ background: "#ffbd2e" }} />
        <span className="tl-dot" style={{ background: "#27c93f" }} />
        <span className="mono small muted" style={{ marginLeft: 12 }}>amir@devops:~ · interactive resume</span>
        <span className="mono small muted" style={{ marginLeft: "auto" }}>bash 5.2.21</span>
      </div>
      <div className="terminal-body" ref={bodyRef}>
        {history.map((line, i) => (
          <div key={i} className={`tline tline-${line.kind}`}>
            {line.kind === "prompt" && <span style={{ color: accent }}>amir@devops:~$ </span>}
            {line.kind === "err" && <span style={{ color: "#ff8866" }}>! </span>}
            <span>{line.text}</span>
          </div>
        ))}
        <div className="tline tline-input">
          <span style={{ color: accent }}>amir@devops:~$ </span>
          <input
            ref={inputRef}
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={(e) => {
              if (e.key === "Enter") {
                run(input);
                setInput("");
              }
            }}
            spellCheck={false}
            autoFocus
          />
          <span className="cursor inline" style={{ background: accent }} />
        </div>
      </div>
      <div className="suggestions">
        {suggestions.map((s) => (
          <button
            key={s}
            className="suggest mono small"
            style={{ borderColor: accent + "44", color: accent }}
            onClick={(e) => {
              e.stopPropagation();
              run(s);
              inputRef.current?.focus();
            }}
          >
            {s}
          </button>
        ))}
      </div>
    </section>
  );
}

function SkillBar({ skill, accent }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) setShown(true);
    }, { threshold: 0.3 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div className="skill-row" ref={ref}>
      <span className="mono small skill-name">{skill.name}</span>
      <div className="skill-bar">
        <div
          className="skill-fill"
          style={{
            width: shown ? `${skill.level * 100}%` : 0,
            background: accent,
            boxShadow: `0 0 8px ${accent}66`,
          }}
        />
        <div className="skill-ticks">
          {Array.from({ length: 10 }).map((_, i) => (
            <span key={i} className="tick" />
          ))}
        </div>
      </div>
      <span className="mono small muted skill-pct">{Math.round(skill.level * 100)}</span>
    </div>
  );
}

            ))}

<script type="text/babel" data-presets="react">
// Mount

const ACCENT_PALETTES = {
  matrix:   { name: "matrix",   color: "#4ade80" },
  amber:    { name: "amber",    color: "#fbbf24" },
  cyan:     { name: "cyan",     color: "#22d3ee" },
  magenta:  { name: "magenta",  color: "#f472b6" },
  ember:    { name: "ember",    color: "#fb7185" },
};

function App() {
  const [t, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "accent": "matrix",
    "density": "default",
    "scanlines": false
  }/*EDITMODE-END*/);

  const accent = (ACCENT_PALETTES[t.accent] || ACCENT_PALETTES.matrix).color;

  React.useEffect(() => {
    document.body.classList.toggle("scanlines", !!t.scanlines);
    document.documentElement.style.setProperty("--accent", accent);
  }, [t.scanlines, accent]);

  return (
    <>
      <div className={`app ${t.density === "compact" ? "compact" : t.density === "roomy" ? "roomy" : ""}`}>
        <HeaderHUD accent={accent} density={t.density} />
        <div className="main-grid">
          <div className="col">
            <Terminal accent={accent} />
            <Timeline accent={accent} />
          </div>
          <div className="col">
            <SkillMatrix accent={accent} />
            <Education accent={accent} />
            <MetaPanels accent={accent} />
          </div>
        </div>
        <Footer accent={accent} />
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Accent">
          <TweakColor
            label="Palette"
            value={ACCENT_PALETTES[t.accent]?.color}
            onChange={(c) => {
              const match = Object.entries(ACCENT_PALETTES).find(([k, v]) => v.color === c);
              if (match) setTweak("accent", match[0]);
            }}
            options={Object.values(ACCENT_PALETTES).map((p) => p.color)}
          />
        </TweakSection>
        <TweakSection title="Density">
          <TweakRadio
            value={t.density}
            onChange={(v) => setTweak("density", v)}
            options={[
              { label: "Compact", value: "compact" },
              { label: "Default", value: "default" },
              { label: "Roomy",   value: "roomy" },
            ]}
          />
        </TweakSection>
        <TweakSection title="Effects">
          <TweakToggle
            label="CRT scanlines"
            value={t.scanlines}
            onChange={(v) => setTweak("scanlines", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
